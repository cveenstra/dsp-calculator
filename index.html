function renderDepTree(buildOrder) {
  const canvas = document.getElementById("dep-tree-canvas");
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const targetItem = state.selectedItem;
  const targetRate = parseFloat(document.getElementById("rate-input").value);
  const depthColors = ['#FAD000', '#B362FF', '#A5FF90', '#9EFFFF', '#FB94FF', '#FF2C70'];

  const NODE_W = 190, NODE_H = 72, H_GAP = 40, V_GAP = 90;
  const FONT_NAME = '15px Nunito, sans-serif';
  const FONT_RATE = '12px Orbitron, sans-serif';
  const FONT_BUILD = '11px Orbitron, sans-serif';

  // Build the tree the same way the build sequence does — full recursive
  // expansion where shared items appear once per consumer branch.
  function buildTree(itemId, rate, depth, visited) {
    const item = ITEMS[itemId];
    if (!item) return null;
    const entry = buildOrder.find(e => e.itemId === itemId);
    if (!entry) return null;
    const recipe = entry.recipe;
    const building = entry.building;
    const isRaw = !recipe || recipe.inputs.length === 0;

    // Compute building count from this branch's rate
    const outputQty = recipe ? (recipe.outputs.find(o => o.item === itemId)?.qty || 1) : 1;
    const buildingSpeed = building ? building.speed : 1;
    const craftsPerMin = rate / outputQty;
    const craftsPerBuilding = (60 / recipe.time) * buildingSpeed;
    const buildingsNeeded = Math.ceil(craftsPerMin / craftsPerBuilding);

    const node = { itemId, item, rate, depth, building, buildingsNeeded, isRaw, children: [], x: 0, y: 0, subtreeWidth: 0 };

    if (!isRaw && recipe.inputs.length > 0 && !visited.has(itemId)) {
      const newVisited = new Set(visited);
      newVisited.add(itemId);
      for (const inp of recipe.inputs) {
        const childRate = (inp.qty / outputQty) * rate;
        const child = buildTree(inp.item, childRate, depth + 1, newVisited);
        if (child) node.children.push(child);
      }
    }
    return node;
  }

  const tree = buildTree(targetItem, targetRate, 0, new Set());
  if (!tree) return;

  // Layout pass 1: subtree widths
  function computeWidths(node) {
    if (node.children.length === 0) { node.subtreeWidth = NODE_W; return; }
    for (const child of node.children) computeWidths(child);
    const cw = node.children.reduce((s, c) => s + c.subtreeWidth, 0) + H_GAP * (node.children.length - 1);
    node.subtreeWidth = Math.max(NODE_W, cw);
  }
  computeWidths(tree);

  // Layout pass 2: positions
  function assignPositions(node, left, top) {
    node.y = top;
    node.x = left + node.subtreeWidth / 2 - NODE_W / 2;
    let childLeft = left;
    for (const child of node.children) {
      assignPositions(child, childLeft, top + NODE_H + V_GAP);
      childLeft += child.subtreeWidth + H_GAP;
    }
  }
  assignPositions(tree, 0, 0);

  // Canvas bounds
  function findBounds(node) {
    let maxX = node.x + NODE_W, maxY = node.y + NODE_H;
    for (const child of node.children) {
      const b = findBounds(child);
      maxX = Math.max(maxX, b.maxX);
      maxY = Math.max(maxY, b.maxY);
    }
    return { maxX, maxY };
  }
  const bounds = findBounds(tree);
  const PAD = 30;
  const canvasW = bounds.maxX + PAD * 2;
  const canvasH = bounds.maxY + PAD * 2;

  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvasW, canvasH);

  const ox = PAD, oy = PAD;

  // Draw edges
  function drawEdges(node) {
    const px = ox + node.x + NODE_W / 2;
    const py = oy + node.y + NODE_H;
    for (const child of node.children) {
      const cx = ox + child.x + NODE_W / 2;
      const cy = oy + child.y;
      const color = depthColors[Math.min(node.depth, depthColors.length - 1)];
      const midY = (py + cy) / 2;

      ctx.strokeStyle = color;
      ctx.globalAlpha = 0.08; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(px, py); ctx.bezierCurveTo(px, midY, cx, midY, cx, cy); ctx.stroke();

      ctx.globalAlpha = 0.6; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(px, py); ctx.bezierCurveTo(px, midY, cx, midY, cx, cy); ctx.stroke();

      ctx.globalAlpha = 0.5; ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();

      ctx.globalAlpha = 1;
      drawEdges(child);
    }
  }
  drawEdges(tree);

  // Draw nodes
  function truncate(str, max) {
    return str.length > max ? str.slice(0, max - 1) + '\u2026' : str;
  }

  function drawNode(node) {
    const x = ox + node.x, y = oy + node.y;
    const d = Math.min(node.depth, depthColors.length - 1);
    const glowColor = depthColors[d];

    ctx.globalAlpha = 0.75; ctx.fillStyle = '#12123a';
    ctx.beginPath(); ctx.roundRect(x, y, NODE_W, NODE_H, 8); ctx.fill();

    ctx.globalAlpha = 0.35; ctx.strokeStyle = glowColor; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(x, y, NODE_W, NODE_H, 8); ctx.stroke();

    ctx.globalAlpha = 0.9; ctx.fillStyle = glowColor;
    ctx.beginPath(); ctx.roundRect(x, y, NODE_W, 2.5, [8, 8, 0, 0]); ctx.fill();

    ctx.globalAlpha = 1;
    ctx.fillStyle = node.item.color; ctx.shadowColor = node.item.color; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(x + 14, y + 18, 5, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;

    ctx.font = 'bold ' + FONT_NAME;
    ctx.fillStyle = node.depth === 0 ? '#FAD000' : '#EEEEFF'; ctx.textAlign = 'left';
    ctx.fillText(truncate(node.item.name, 20), x + 26, y + 22);

    ctx.font = FONT_RATE; ctx.fillStyle = '#FAD000';
    ctx.fillText(node.rate.toFixed(1) + '/min', x + 14, y + 42);

    ctx.font = FONT_BUILD; ctx.fillStyle = '#B362FF';
    ctx.fillText(truncate(node.buildingsNeeded + 'x ' + (node.building ? node.building.name : 'Extractor'), 26), x + 14, y + 58);

    if (node.isRaw) {
      ctx.globalAlpha = 0.3; ctx.setLineDash([4, 3]); ctx.strokeStyle = '#FAD000'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(x + 1, y + 1, NODE_W - 2, NODE_H - 2, 7); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha = 1;
    }

    for (const child of node.children) drawNode(child);
  }
  drawNode(tree);
}

function renderMathBreakdown(buildOrder) {
  const container = document.getElementById("math-breakdown");
  const targetItem = ITEMS[state.selectedItem];
  const targetRate = parseFloat(document.getElementById("rate-input").value);

  // Helper to format a number nicely
  const fmt = (n) => {
    if (Number.isInteger(n)) return n.toString();
    return n % 1 === 0 ? n.toFixed(0) : n.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
  };

  const itemName = (id) => ITEMS[id]?.name || id;

  // Build the overview section explaining how the formulas connect
  let html = `
    <div class="math-overview">
      <h3>How the Calculator Works</h3>
      <p>
        You asked for <em style="color:var(--neon-gold)">${fmt(targetRate)}/min</em> of
        <em style="color:var(--neon-gold)">${targetItem?.name || state.selectedItem}</em>.
        The calculator chains four formulas together in a loop, starting from your target and working
        backward through every ingredient until it hits raw resources. Here&rsquo;s how they connect:
      </p>

      <div class="formula-block" style="text-align:center; font-size:18px; line-height: 2.2;">
        <span style="color:var(--neon-gold)">You want X/min of an item</span><br>
        &darr;&ensp;<span style="color:var(--text-muted); font-size:16px">feeds into</span><br>
        <span style="color:var(--neon-cyan)">Formula 1</span> &rarr; how many craft cycles/min the factory needs<br>
        &darr;&ensp;<span style="color:var(--text-muted); font-size:16px">compared against</span><br>
        <span style="color:var(--neon-cyan)">Formula 2</span> &rarr; how many cycles one building can do/min<br>
        &darr;&ensp;<span style="color:var(--text-muted); font-size:16px">divided to get</span><br>
        <span style="color:var(--neon-green)">Formula 3</span> &rarr; <strong>how many buildings to place</strong><br>
        &darr;&ensp;<span style="color:var(--text-muted); font-size:16px">and simultaneously</span><br>
        <span style="color:var(--neon-magenta)">Formula 4</span> &rarr; how much of each input ingredient/min<br>
        &darr;&ensp;<span style="color:var(--text-muted); font-size:16px">each input rate <em>becomes a new &ldquo;X/min&rdquo;</em> &mdash; loop back to top</span><br>
        <span style="color:var(--neon-purple)">&uarr; this loop runs once for every crafted ingredient in the chain.</span><br>
        <span style="color:var(--neon-purple)">It stops when it reaches raw ores/liquids (Iron Ore, Copper Ore, etc.)</span><br>
        <span style="color:var(--neon-purple)">because those are mined directly &mdash; they have no recipe inputs, so</span><br>
        <span style="color:var(--neon-purple)">there&rsquo;s nothing left to recurse into. You just need miners.</span>
      </div>

      <h3 style="margin-top:20px">The Four Formulas</h3>

      <div class="formula-block">
        <span class="label">Formula 1 &mdash; Crafts needed per minute</span>
        crafts/min = desired_rate &divide; output_qty_per_craft
      </div>
      <p>
        <strong>What it does:</strong> Converts your desired item rate into craft cycles.
        A recipe that outputs 2 items per craft only needs half as many cycles as one that outputs 1.
        <br><strong>Feeds into:</strong> Formula 3 (numerator) and Formula 4 (drives input demand).
      </p>

      <div class="formula-block">
        <span class="label">Formula 2 &mdash; Crafts one building can do per minute</span>
        building_crafts/min = (60 &divide; craft_time_seconds) &times; speed_multiplier
      </div>
      <p>
        <strong>What it does:</strong> Tells you the throughput capacity of a single building.
        A 2-second recipe at 1.0x speed = 30 crafts/min. At 1.5x (Mk.III) = 45 crafts/min.
        <br><strong>Feeds into:</strong> Formula 3 (denominator). This is the &ldquo;how fast is one building&rdquo; half of the equation.
      </p>

      <div class="formula-block">
        <span class="label">Formula 3 &mdash; Number of buildings required</span>
        buildings = &lceil; crafts/min &divide; building_crafts/min &rceil;
      </div>
      <p>
        <strong>What it does:</strong> Divides total demand (Formula 1) by single-building capacity (Formula 2)
        and rounds up. This is the <em>answer</em> &mdash; how many of this building to place.
        <br><strong>Depends on:</strong> Formula 1 output &divide; Formula 2 output.
      </p>

      <div class="formula-block">
        <span class="label">Formula 4 &mdash; Input item rate (the recursive link)</span>
        input_rate = (input_qty &divide; output_qty) &times; desired_rate
      </div>
      <p>
        <strong>What it does:</strong> For each ingredient in the recipe, calculates how much of it
        you need per minute. This is the formula that <em>creates the chain</em>.
        <br><strong>Key connection:</strong> Each input_rate becomes a brand new <em>desired_rate</em> for that ingredient,
        and the whole loop (Formulas 1&rarr;2&rarr;3&rarr;4) runs again for it. If Magnetic Coil needs
        Magnet and Copper Ingot, each of those gets its own desired_rate, which triggers its own
        set of building calculations and its own inputs, all the way down.
        <br><strong>Merging:</strong> When two different recipes both need the same ingredient
        (e.g. Iron Ingot is needed by Gears <em>and</em> Circuit Boards), their rates are <em>summed</em>
        before the formulas run for that ingredient. That&rsquo;s why you see one combined Iron Ingot
        entry, not two separate ones.
      </p>
    </div>

    <div class="math-overview" style="border-color: rgba(179, 102, 255, 0.15); margin-bottom: 16px;">
      <h3>Per-Item Breakdown</h3>
      <p>Click any item below to see exactly how the four formulas were applied with your actual numbers.</p>
    </div>

    <div class="math-breakdown">
  `;

  // Per-item breakdowns
  buildOrder.forEach((entry, index) => {
    const item = ITEMS[entry.itemId];
    if (!item) return;
    const recipe = entry.recipe;
    const building = entry.building;
    const outputEntry = recipe.outputs.find(o => o.item === entry.itemId);
    const outputQty = outputEntry ? outputEntry.qty : 1;
    const craftsPerMin = entry.rate / outputQty;
    const buildingSpeed = building ? building.speed : 1;
    const craftsPerMinPerBuilding = (60 / recipe.time) * buildingSpeed;
    const exactBuildings = craftsPerMin / craftsPerMinPerBuilding;
    const ceilBuildings = Math.ceil(exactBuildings);
    const isRaw = recipe.inputs.length === 0;

    // Determine color for item label based on category
    const catColorMap = {
      raw: 'var(--neon-orange)', smelting: 'var(--neon-red)', assembling: 'var(--neon-cyan)',
      chemical: 'var(--neon-green)', refining: 'var(--neon-yellow)', research: 'var(--neon-magenta)',
      collider: 'var(--neon-purple)', fractionation: 'var(--neon-pink)', building: 'var(--neon-yellow)',
    };
    const itemColor = catColorMap[entry.category] || 'var(--neon-cyan)';

    html += `
      <div class="math-item" style="animation-delay: ${index * 0.04}s">
        <div class="math-item-header" onclick="this.parentElement.classList.toggle('open')">
          <div>
            <span class="item-label" style="color: ${itemColor}">${iconImg(item.name, 20)}${item.name}</span>
            <span class="item-summary">
              &mdash; <span class="val">${fmt(entry.rate)}/min</span> using
              <span class="val">${ceilBuildings}x ${building ? building.name : 'Extractor'}</span>
            </span>
          </div>
          <span class="toggle-icon">&#9660;</span>
        </div>
        <div class="math-item-body">
    `;

    if (isRaw) {
      // Raw resource — simpler explanation
      html += `
          <div class="math-step">
            <div class="step-label">Demand Source</div>
            <div class="step-explanation">
              This is a <em>raw resource</em> that is mined or extracted directly.
              The total demand of <em>${fmt(entry.rate)}/min</em> is the sum of all recipes further
              up the chain that consume ${item.name}.
            </div>
          </div>
          <div class="math-step">
            <div class="step-label">Extraction Rate</div>
            <div class="step-formula">
              One ${building ? building.name : 'Extractor'} produces roughly
              <span class="num">${fmt(60 / recipe.time * buildingSpeed)}/min</span> per node/patch
            </div>
            <div class="step-explanation">
              At base extraction time of <em>${fmt(recipe.time)}s</em> per unit, that's
              60 &divide; ${fmt(recipe.time)} = ${fmt(60 / recipe.time)} units/min per building.
              The actual number of miners depends on how many resource nodes you place them on,
              and vein utilization. This calculator assumes the standard base rate.
            </div>
          </div>
          <div class="math-step">
            <div class="step-label">Buildings Needed</div>
            <div class="step-formula">
              <span class="num">${fmt(entry.rate)}</span> <span class="op">&divide;</span>
              <span class="num">${fmt(60 / recipe.time * buildingSpeed)}</span>
              <span class="op">=</span>
              <span class="num">${fmt(exactBuildings)}</span>
              <span class="op">&rarr; &lceil;</span><span class="eq">${ceilBuildings}</span><span class="op">&rceil;</span>
            </div>
            <div class="step-explanation">
              You need <em>${fmt(entry.rate)}/min</em> total, so
              ${fmt(entry.rate)} &divide; ${fmt(60 / recipe.time * buildingSpeed)} = ${fmt(exactBuildings)}
              &rarr; rounded up to <em>${ceilBuildings}</em> ${building ? building.name : 'Extractor'}(s).
            </div>
          </div>
      `;
    } else {
      // Produced item — full formula breakdown
      // Step 1: Why this rate?
      html += `
          <div class="math-step">
            <div class="step-label">Step 1 &mdash; Where does the demand come from?</div>
            <div class="step-explanation">
              The total demand for ${item.name} is <em>${fmt(entry.rate)}/min</em>.
              This is the sum of all recipes in the chain that consume it.
              The recipe "${recipe.name}" produces <em>${outputQty}</em> ${item.name} per craft cycle.
            </div>
          </div>
      `;

      // Step 2: Crafts per minute
      html += `
          <div class="math-step">
            <div class="step-label">Step 2 &mdash; Crafts per minute needed</div>
            <div class="step-formula">
              crafts/min <span class="op">=</span> desired_rate <span class="op">&divide;</span> output_per_craft<br>
              crafts/min <span class="op">=</span> <span class="num">${fmt(entry.rate)}</span>
              <span class="op">&divide;</span> <span class="num">${outputQty}</span>
              <span class="op">=</span> <span class="eq">${fmt(craftsPerMin)}</span>
            </div>
            <div class="step-explanation">
              Each craft cycle of this recipe produces <em>${outputQty}</em> ${item.name},
              so to get ${fmt(entry.rate)}/min output, the buildings need to collectively
              complete <em>${fmt(craftsPerMin)}</em> craft cycles per minute.
            </div>
          </div>
      `;

      // Step 3: Building throughput
      html += `
          <div class="math-step">
            <div class="step-label">Step 3 &mdash; Crafts per building per minute</div>
            <div class="step-formula">
              building_crafts/min <span class="op">=</span> (60 <span class="op">&divide;</span> craft_time)
              <span class="op">&times;</span> speed_multiplier<br>
              building_crafts/min <span class="op">=</span>
              (60 <span class="op">&divide;</span> <span class="num">${fmt(recipe.time)}</span>)
              <span class="op">&times;</span> <span class="num">${fmt(buildingSpeed)}</span>
              <span class="op">=</span> <span class="num">${fmt(60 / recipe.time)}</span>
              <span class="op">&times;</span> <span class="num">${fmt(buildingSpeed)}</span>
              <span class="op">=</span> <span class="eq">${fmt(craftsPerMinPerBuilding)}</span>
            </div>
            <div class="step-explanation">
              The recipe takes <em>${fmt(recipe.time)} seconds</em> per craft.
              A single <em>${building ? building.name : 'building'}</em> (speed: ${fmt(buildingSpeed)}x)
              can do <em>${fmt(craftsPerMinPerBuilding)}</em> crafts per minute.
            </div>
          </div>
      `;

      // Step 4: Buildings needed
      html += `
          <div class="math-step">
            <div class="step-label">Step 4 &mdash; Number of buildings</div>
            <div class="step-formula">
              buildings <span class="op">=</span> &lceil; crafts_needed <span class="op">&divide;</span> crafts_per_building &rceil;<br>
              buildings <span class="op">=</span> &lceil;
              <span class="num">${fmt(craftsPerMin)}</span>
              <span class="op">&divide;</span>
              <span class="num">${fmt(craftsPerMinPerBuilding)}</span>
              &rceil; <span class="op">=</span> &lceil;
              <span class="num">${fmt(exactBuildings)}</span>
              &rceil; <span class="op">=</span> <span class="eq">${ceilBuildings}</span>
            </div>
            <div class="step-explanation">
              ${fmt(craftsPerMin)} crafts/min needed &divide; ${fmt(craftsPerMinPerBuilding)} crafts/min per building
              = ${fmt(exactBuildings)} buildings.
              Rounded up: <em>${ceilBuildings}x ${building ? building.name : 'building'}</em>.
            </div>
          </div>
      `;

      // Step 5: Input rates
      if (recipe.inputs.length > 0) {
        let inputRows = '';
        for (const inp of recipe.inputs) {
          const inputRate = (inp.qty / outputQty) * entry.rate;
          inputRows += `
            <span class="num">${itemName(inp.item)}</span>:
            (<span class="num">${inp.qty}</span> <span class="op">&divide;</span>
            <span class="num">${outputQty}</span>) <span class="op">&times;</span>
            <span class="num">${fmt(entry.rate)}</span> <span class="op">=</span>
            <span class="eq">${fmt(inputRate)}/min</span><br>
          `;
        }

        html += `
          <div class="math-step">
            <div class="step-label">Step 5 &mdash; Input consumption rates</div>
            <div class="step-formula">
              input_rate <span class="op">=</span> (input_qty <span class="op">&divide;</span> output_qty)
              <span class="op">&times;</span> desired_rate<br><br>
              ${inputRows}
            </div>
            <div class="step-explanation">
              These input rates become the <em>desired rates</em> for each ingredient.
              The same formulas are then applied to those ingredients recursively.
              If multiple recipes need the same ingredient, their rates are added together.
            </div>
          </div>
        `;
      }
    }

    html += `
        </div>
      </div>
    `;
  });

  html += `</div>`;
  container.innerHTML = html;
}

// Calculate button
function setupCalculate() {
  document.getElementById("calc-btn").addEventListener("click", () => {
    if (!state.selectedItem) {
      alert("Please select a target item.");
      return;
    }
    let rate = parseFloat(document.getElementById("rate-input").value);
    // Auto-fill to 1 building's output if empty or invalid
    if (!rate || rate <= 0) {
      rate = getOneBuildingRate(state.selectedItem);
      document.getElementById("rate-input").value = parseFloat(rate.toFixed(2));
    }

    const requirements = calculateChain(state.selectedItem, rate);
    renderResults(requirements);
  });

  // Also calculate on Enter in rate input
  document.getElementById("rate-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("calc-btn").click();
  });

  // Reset button
  document.getElementById("reset-btn").addEventListener("click", () => {
    state.selectedItem = null;
    document.getElementById("item-search").value = "";
    document.getElementById("rate-input").value = "";
    document.getElementById("results-section").style.display = "none";
    document.getElementById("empty-state").style.display = "";
    // Reset to first tab
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    document.querySelector(".tab-btn").classList.add("active");
    document.querySelector(".tab-content").classList.add("active");
  });
}

function initStarfield() {
  const canvas = document.getElementById("starfield");
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  const stars = [];
  const numStars = 250;
  for (let i = 0; i < numStars; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 1.5 + 0.3,
      baseOpacity: Math.random() * 0.5 + 0.2,
      twinkleSpeed: Math.random() * 0.003 + 0.001,
      twinkleOffset: Math.random() * Math.PI * 2,
      hue: Math.random() > 0.7 ? [180, 200, 260, 280, 320, 40][Math.floor(Math.random() * 6)] : 0,
    });
  }

  // Shooting stars
  const shootingStars = [];

  function spawnShootingStar() {
    if (shootingStars.length < 2 && Math.random() < 0.005) {
      shootingStars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.5,
        vx: (Math.random() - 0.3) * 8,
        vy: Math.random() * 4 + 2,
        life: 1,
        decay: Math.random() * 0.015 + 0.01,
        length: Math.random() * 40 + 20,
      });
    }
  }

  function animate() {
    ctx.fillStyle = "#0e0e22";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Psychedelic nebula system — each cloud independently cycles through different color ranges
    const t = Date.now() * 0.0001;
    const w = canvas.width;
    const h = canvas.height;

    // Helper: convert HSL to RGB (h: 0-360, s/l: 0-1)
    function hsl2rgb(hue, sat, lit) {
      const c = (1 - Math.abs(2 * lit - 1)) * sat;
      const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
      const m = lit - c / 2;
      let r, g, b;
      if (hue < 60) { r = c; g = x; b = 0; }
      else if (hue < 120) { r = x; g = c; b = 0; }
      else if (hue < 180) { r = 0; g = c; b = x; }
      else if (hue < 240) { r = 0; g = x; b = c; }
      else if (hue < 300) { r = x; g = 0; b = c; }
      else { r = c; g = 0; b = x; }
      return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
    }

    // Shamanic Mardi Gras in space — royal purples, ritual golds, mystic greens
    // Deep SoP purple-blacks with Mardi Gras trinity (purple, gold, green)
    const breathe = Math.sin(t * 0.25) * 0.015;

    const nebulae = [
      // Royal purple foundation — the dominant SoP presence
      { xBase: 0.25, yBase: 0.20, xAmp: 0.07, yAmp: 0.05, xFreq: 0.35, yFreq: 0.25, r: 450, hueBase: 268, hueRange: 25,  hueSpeed: 0.1,  alpha: 0.085 + breathe, sat: 0.7, lit: 0.3 },
      { xBase: 0.75, yBase: 0.70, xAmp: 0.06, yAmp: 0.04, xFreq: 0.3,  yFreq: 0.4,  r: 420, hueBase: 275, hueRange: 30,  hueSpeed: 0.12, alpha: 0.07 + breathe, sat: 0.65, lit: 0.28 },
      { xBase: 0.50, yBase: 0.45, xAmp: 0.05, yAmp: 0.05, xFreq: 0.4,  yFreq: 0.3,  r: 380, hueBase: 258, hueRange: 20,  hueSpeed: 0.08, alpha: 0.06, sat: 0.6, lit: 0.25 },

      // Ritual gold / amber — Mardi Gras warmth bleeding through
      { xBase: 0.60, yBase: 0.25, xAmp: 0.05, yAmp: 0.06, xFreq: 0.45, yFreq: 0.2,  r: 280, hueBase: 45,  hueRange: 15,  hueSpeed: 0.18, alpha: 0.05 + breathe, sat: 0.85, lit: 0.45 },
      { xBase: 0.20, yBase: 0.65, xAmp: 0.04, yAmp: 0.04, xFreq: 0.35, yFreq: 0.5,  r: 220, hueBase: 40,  hueRange: 12,  hueSpeed: 0.22, alpha: 0.04, sat: 0.8, lit: 0.5 },

      // Mystic green — shamanic emerald glow
      { xBase: 0.80, yBase: 0.40, xAmp: 0.05, yAmp: 0.07, xFreq: 0.5,  yFreq: 0.25, r: 300, hueBase: 130, hueRange: 20,  hueSpeed: 0.15, alpha: 0.05 + breathe, sat: 0.75, lit: 0.4 },
      { xBase: 0.35, yBase: 0.80, xAmp: 0.04, yAmp: 0.03, xFreq: 0.3,  yFreq: 0.6,  r: 240, hueBase: 140, hueRange: 18,  hueSpeed: 0.2,  alpha: 0.04, sat: 0.7, lit: 0.35 },

      // Deep violet / magenta accents — where purple meets the mystic
      { xBase: 0.15, yBase: 0.35, xAmp: 0.04, yAmp: 0.05, xFreq: 0.55, yFreq: 0.35, r: 260, hueBase: 290, hueRange: 25,  hueSpeed: 0.16, alpha: 0.045, sat: 0.75, lit: 0.35 },
      { xBase: 0.65, yBase: 0.55, xAmp: 0.03, yAmp: 0.04, xFreq: 0.4,  yFreq: 0.45, r: 200, hueBase: 310, hueRange: 20,  hueSpeed: 0.2,  alpha: 0.035, sat: 0.7, lit: 0.38 },

      // Rare cosmic blue whisper — deep space between the colors
      { xBase: 0.45, yBase: 0.15, xAmp: 0.03, yAmp: 0.03, xFreq: 0.5,  yFreq: 0.3,  r: 200, hueBase: 240, hueRange: 15,  hueSpeed: 0.12, alpha: 0.03, sat: 0.5, lit: 0.3 },
    ];

    for (const neb of nebulae) {
      const nx = w * (neb.xBase + Math.sin(t * neb.xFreq) * neb.xAmp);
      const ny = h * (neb.yBase + Math.cos(t * neb.yFreq) * neb.yAmp);
      const hue = (neb.hueBase + Math.sin(t * neb.hueSpeed) * neb.hueRange + 360) % 360;
      // Per-cloud saturation and lightness for richer, deeper tones
      const sat = neb.sat || 0.7;
      const lit = neb.lit || 0.35;
      const [cr, cg, cb] = hsl2rgb(hue, sat, lit);
      const a = neb.alpha;
      // Softer radial falloff — more organic blending
      const gradient = ctx.createRadialGradient(nx, ny, 0, nx, ny, neb.r);
      gradient.addColorStop(0, `rgba(${cr}, ${cg}, ${cb}, ${a})`);
      gradient.addColorStop(0.25, `rgba(${cr}, ${cg}, ${cb}, ${a * 0.65})`);
      gradient.addColorStop(0.55, `rgba(${cr}, ${cg}, ${cb}, ${a * 0.25})`);
      gradient.addColorStop(0.8, `rgba(${cr}, ${cg}, ${cb}, ${a * 0.06})`);
      gradient.addColorStop(1, "transparent");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);
    }

    // Stars
    const now = Date.now();
    for (const star of stars) {
      const twinkle = Math.sin(now * star.twinkleSpeed + star.twinkleOffset);
      const opacity = Math.max(0.05, Math.min(1, star.baseOpacity + twinkle * 0.3));

      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
      if (star.hue > 0) {
        ctx.fillStyle = `hsla(${star.hue}, 80%, 80%, ${opacity})`;
      } else {
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
      }
      ctx.fill();

      // Glow for brighter stars
      if (star.radius > 1.2) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 220, 255, ${opacity * 0.08})`;
        ctx.fill();
      }
    }

    // Shooting stars
    spawnShootingStar();
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const ss = shootingStars[i];
      ss.x += ss.vx;
      ss.y += ss.vy;
      ss.life -= ss.decay;

      if (ss.life <= 0) {
        shootingStars.splice(i, 1);
        continue;
      }

      const gradient = ctx.createLinearGradient(
        ss.x, ss.y,
        ss.x - ss.vx * ss.length / 4, ss.y - ss.vy * ss.length / 4
      );
      gradient.addColorStop(0, `rgba(255, 255, 255, ${ss.life})`);
      gradient.addColorStop(1, `rgba(150, 200, 255, 0)`);

      ctx.strokeStyle = gradient;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y);
      ctx.lineTo(ss.x - ss.vx * ss.length / 4, ss.y - ss.vy * ss.length / 4);
      ctx.stroke();
    }

    requestAnimationFrame(animate);
  }

  animate();
}

// Render a visual recipe block with icons for encyclopedia entries
function renderRecipeBlock(recipe) {
  const inputPills = recipe.inputs.map(name =>
    `<span class="recipe-pill" style="margin:3px 0">${iconImg(name, 20)}<span class="pill-name">${name}</span></span>`
  ).join('<span class="recipe-pill pill-times">+</span>');

  const outQty = recipe.outputQty || 1;
  const qtyLabel = outQty > 1 ? `<span class="pill-qty">${outQty}x</span>` : '';
  const outputPill = `<span class="recipe-pill output-pill" style="margin:3px 0">${qtyLabel}${iconImg(recipe.output, 20)}<span class="pill-name">${recipe.output}</span></span>`;

  const buildingLabel = recipe.building ? `<span style="color:var(--text-muted);font-size:0.9rem;margin-left:8px">in ${iconImg(recipe.building, 18)}${recipe.building} (${recipe.time}s)</span>` : '';

  return `<div class="recipe-pills" style="margin:12px 0;padding:10px 14px;background:rgba(0,0,0,0.2);border-radius:8px;border:1px solid rgba(105,67,255,0.08)">
    ${inputPills}
    <span class="recipe-arrow">&rarr;</span>
    ${outputPill}
    ${buildingLabel}
  </div>`;
}

// Render the Dark Forest encyclopedia
function renderEncyclopedia() {
  const sidebar = document.getElementById("forest-sidebar");
  const content = document.getElementById("ency-content");

  // Build sidebar
  sidebar.innerHTML = ENCYCLOPEDIA.map((cat, i) =>
    `<button class="forest-sidebar-btn${i === 0 ? ' active' : ''}" data-cat="${cat.id}" style="border-left-color: ${i === 0 ? cat.color : 'transparent'}" data-color="${cat.color}">${cat.name}</button>`
  ).join('');

  function renderCategory(catId) {
    const cat = ENCYCLOPEDIA.find(c => c.id === catId);
    if (!cat) return;

    // Update sidebar active state
    sidebar.querySelectorAll('.forest-sidebar-btn').forEach(btn => {
      const isActive = btn.dataset.cat === catId;
      btn.classList.toggle('active', isActive);
      btn.style.borderLeftColor = isActive ? btn.dataset.color : 'transparent';
    });

    let html = `<h3 class="ency-header">${cat.name}</h3>`;
    for (const entry of cat.entries) {
      const phaseClass = entry.phase === 'early' ? 'phase-early' : entry.phase === 'mid' ? 'phase-mid' : entry.phase === 'late' ? 'phase-late' : 'phase-end';
      const phaseLabel = entry.phase.charAt(0).toUpperCase() + entry.phase.slice(1) + ' Game';
      const tipsHtml = entry.tips.length > 0 ? `<ul class="ency-tips">${entry.tips.map(t => `<li>${t}</li>`).join('')}</ul>` : '';
      const ratiosHtml = entry.ratios ? `<div class="ency-ratios">${entry.ratios.replace(/\n/g, '<br>')}</div>` : '';

      html += `
        <div class="ency-card">
          <div class="ency-card-header" onclick="this.parentElement.classList.toggle('open')">
            <div><span class="ency-card-title">${entry.useIcons ? iconImg(entry.title, 24) : ''}${entry.title}</span><span class="ency-card-phase ${phaseClass}">${phaseLabel}</span></div>
            <span class="ency-card-toggle">&#9660;</span>
          </div>
          <div class="ency-card-body">
            <p>${entry.desc}</p>
            ${entry.recipe ? renderRecipeBlock(entry.recipe) : ''}
            ${tipsHtml}
            ${ratiosHtml}
          </div>
        </div>
      `;
    }
    content.innerHTML = html;
  }

  // Sidebar click
  sidebar.addEventListener('click', (e) => {
    const btn = e.target.closest('.forest-sidebar-btn');
    if (btn) renderCategory(btn.dataset.cat);
  });

  // Initial render
  renderCategory(ENCYCLOPEDIA[0].id);
}

// Dark Forest tab switching
function setupForestTabs() {
  document.querySelectorAll('.forest-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.forest-tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.forest-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`forest-${btn.dataset.ftab}`).classList.add('active');
    });
  });
}

// Save Analyzer
function setupAnalyzer() {
  const browseBtn = document.getElementById('analyzer-browse');
  const runBtn = document.getElementById('analyzer-run');
  const pathEl = document.getElementById('analyzer-path');
  const resultsEl = document.getElementById('analyzer-results');
  let selectedPath = null;

  if (!browseBtn || !runBtn) return;

  browseBtn.addEventListener('click', async () => {
    if (window.electronAPI?.openSaveFile) {
      const path = await window.electronAPI.openSaveFile();
      if (path) {
        selectedPath = path;
        pathEl.textContent = path;
        pathEl.style.color = 'var(--text-primary)';
      }
    } else {
      resultsEl.innerHTML = '<div class="analyzer-error">Save file browsing requires the Electron desktop app. Open this in <code>npm start</code> instead of a browser.</div>';
    }
  });

  runBtn.addEventListener('click', async () => {
    if (!selectedPath) {
      resultsEl.innerHTML = '<div class="analyzer-error">Please select a save file first.</div>';
      return;
    }
    if (!window.electronAPI?.analyzeSave) {
      resultsEl.innerHTML = '<div class="analyzer-error">Save analysis requires the Electron desktop app.</div>';
      return;
    }

    resultsEl.innerHTML = '<div class="analyzer-loading">Scanning the dark forest...</div>';

    try {
      const data = await window.electronAPI.analyzeSave(selectedPath);

      if (data.error) {
        let errorHtml = `<div class="analyzer-error">${data.error}`;
        if (data.detail) errorHtml += `<br><br>${data.detail}`;
        if (data.setup) errorHtml += `<code>${data.setup}</code>`;
        if (data.stderr) errorHtml += `<code>${data.stderr}</code>`;
        errorHtml += '</div>';
        resultsEl.innerHTML = errorHtml;
        return;
      }

      let html = '';

      // Next Building to Automate
      if (data.recommendations?.next_buildings?.length > 0) {
        html += '<div class="rec-card"><h4 style="color:var(--neon-purple)">Next Building to Automate</h4><ul class="rec-list">';
        for (const b of data.recommendations.next_buildings) {
          const pClass = b.priority === 'high' ? 'high' : b.priority === 'medium' ? 'med' : 'low';
          html += `<li><span class="rec-priority ${pClass}">${b.priority}</span><a href="#" class="rec-build-link" data-building="${b.name}" style="color:var(--neon-gold);text-decoration:underline;cursor:pointer">${iconImg(b.name, 18)}${b.name}</a>${b.reason ? ' — <span style="color:var(--text-muted)">' + b.reason + '</span>' : ''}</li>`;
        }
        html += '</ul></div>';
      }

      // Next Research
      if (data.recommendations?.next_research?.length > 0) {
        html += '<div class="rec-card"><h4 style="color:var(--neon-green)">Next Research to Queue</h4><ul class="rec-list">';
        for (const t of data.recommendations.next_research) {
          const pClass = t.priority === 'high' ? 'high' : t.priority === 'medium' ? 'med' : 'low';
          html += `<li><span class="rec-priority ${pClass}">${t.priority}</span>${t.name}${t.reason ? ' — <span style="color:var(--text-muted)">' + t.reason + '</span>' : ''}</li>`;
        }
        html += '</ul></div>';
      }

      // Next Upgrade
      if (data.recommendations?.next_upgrades?.length > 0) {
        html += '<div class="rec-card"><h4 style="color:var(--neon-cyan)">Next Upgrade to Research</h4><ul class="rec-list">';
        for (const u of data.recommendations.next_upgrades) {
          const pClass = u.priority === 'high' ? 'high' : u.priority === 'medium' ? 'med' : 'low';
          html += `<li><span class="rec-priority ${pClass}">${u.priority}</span>${u.name}${u.reason ? ' — <span style="color:var(--text-muted)">' + u.reason + '</span>' : ''}</li>`;
        }
        html += '</ul></div>';
      }

      if (!html) {
        html = '<div class="analyzer-error" style="border-color:rgba(165,255,144,0.2);color:var(--neon-green)">Save file parsed successfully but no specific recommendations generated. You may be further along than the analyzer expects!</div>';
      }

      // Summary stats if available
      if (data.summary) {
        html = `<div class="rec-card"><h4 style="color:var(--text-muted)">Save Summary</h4><p style="color:var(--text-muted);font-size:1.05rem;line-height:1.7">${data.summary}</p></div>` + html;
      }

      resultsEl.innerHTML = html;

      // Wire up building links to switch to calculator and run
      resultsEl.querySelectorAll('.rec-build-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const buildingName = link.dataset.building;
          // Find the item ID that matches this building name
          const itemId = Object.keys(ITEMS).find(id => ITEMS[id].name === buildingName);
          if (!itemId) return;
          // Switch to Happy Little Trees mode
          document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
          document.getElementById('mode-btn-trees').classList.add('active');
          document.getElementById('mode-trees').classList.add('active');
          // Set the item and calculate
          state.selectedItem = itemId;
          document.getElementById('item-search').value = buildingName;
          document.getElementById('rate-input').value = parseFloat(getOneBuildingRate(itemId).toFixed(2));
          document.getElementById('calc-btn').click();
        });
      });

    } catch (err) {
      resultsEl.innerHTML = `<div class="analyzer-error">Analysis failed: ${err.message || err}</div>`;
    }
  });
}

// Mode switching
function setupModes() {
  const modeBtns = document.querySelectorAll('.mode-btn');
  const modeContents = document.querySelectorAll('.mode-content');

  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      modeBtns.forEach(b => b.classList.remove('active'));
      modeContents.forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`mode-${mode}`).classList.add('active');
    });
  });
}

// =====================================================
// SECTION 7: INITIALIZATION
// =====================================================

document.addEventListener("DOMContentLoaded", () => {
  initStarfield();
  buildDropdown();
  setupTierButtons();
  setupTabs();
  setupCalculate();
  setupModes();
  renderEncyclopedia();
  setupForestTabs();
  setupAnalyzer();

  // Mouse tracking glow on result cards
  document.addEventListener("mousemove", (e) => {
    const cards = document.querySelectorAll(".result-card");
    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      card.style.setProperty("--mouse-x", x + "%");
      card.style.setProperty("--mouse-y", y + "%");
    });
  });

  // Electron titlebar setup — auto-hide, show on hover
  if (window.electronAPI) {
    const titlebar = document.getElementById("titlebar");
    const trigger = document.getElementById("titlebar-trigger");
    titlebar.classList.add("electron-active");
    trigger.classList.add("active");

    // Show titlebar when mouse enters the top zone or the bar itself
    trigger.addEventListener("mouseenter", () => titlebar.classList.add("force-show"));
    titlebar.addEventListener("mouseenter", () => titlebar.classList.add("force-show"));
    titlebar.addEventListener("mouseleave", () => titlebar.classList.remove("force-show"));

    document.getElementById("btn-minimize").addEventListener("click", () => window.electronAPI.minimize());
    document.getElementById("btn-maximize").addEventListener("click", () => window.electronAPI.maximize());
    document.getElementById("btn-fullscreen").addEventListener("click", () => window.electronAPI.fullscreen());
    document.getElementById("btn-close").addEventListener("click", () => window.electronAPI.close());
  }
});
</script>
</body>
